<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga Translator TH</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #111; color: white; overflow: hidden; }
        #header { display: flex; padding: 10px; background: #222; gap: 10px; }
        #urlInput { flex: 1; padding: 10px; border-radius: 5px; border: none; font-size: 14px; }
        #goBtn { padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #webview { width: 100%; height: calc(100% - 60px); border: none; }
        #translateBtn { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: #ff5722; border-radius: 50%; border: none; color: white; font-size: 24px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); z-index: 9999; cursor: pointer; }
        #resultBox { position: fixed; top: 10%; left: 5%; width: 90%; height: 80%; background: rgba(0,0,0,0.95); padding: 20px; border-radius: 10px; display: none; z-index: 10000; overflow-y: auto; }
        #resultText { white-space: pre-wrap; margin-bottom: 15px; line-height: 1.5; }
        #closeBtn { padding: 10px 20px; background: #007bff; border: none; color: white; border-radius: 5px; width: 100%; }
    </style>
</head>
<body>
    <div id="header">
        <input type="text" id="urlInput" placeholder="ใส่ URL เว็บมังงะ..." value="https://www.google.com">
        <button id="goBtn" onclick="loadUrl()">Go</button>
    </div>
    <iframe id="webview" src="https://www.google.com"></iframe>
    <button id="translateBtn" onclick="translatePage()">🌐</button>
    <div id="resultBox">
        <div id="resultText">กำลังประมวลผล...</div>
        <button id="closeBtn" onclick="document.getElementById('resultBox').style.display='none'">ปิด</button>
    </div>

    <script>
        function loadUrl() {
            let url = document.getElementById('urlInput').value;
            if (!url.startsWith('http')) { url = 'https://' + url; }
            document.getElementById('webview').src = url;
        }

        async function translateText(rawText, targetLang = 'th') {
            const lines = rawText.split('\n').filter(line => line.trim() !== '');
            let translatedLines = [];
            for (const line of lines) {
                let url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURIComponent(line)}`;
                let res = await fetch(url);
                let data = await res.json();
                let translatedLine = "";
                if (data && data[0]) {
                    for (let i = 0; i < data[0].length; i++) {
                        if (data[0][i][0]) translatedLine += data[0][i][0];
                    }
                }
                translatedLines.push(translatedLine);
            }
            return translatedLines.join('\n');
        }

        async function translatePage() {
            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('resultText').innerText = 'กำลังสแกนและแปลข้อความ...';
            try {
                // ⚠️ ตรงนี้คือส่วนที่ดึงข้อความจากมังงะ (ตอนนี้เป็นตัวอย่าง)
                let rawText = "Hello World\nThis is a manga test"; 
                let result = await translateText(rawText, 'th');
                document.getElementById('resultText').innerText = result;
            } catch (error) {
                document.getElementById('resultText').innerText = 'เกิดข้อผิดพลาดในการแปล';
            }
        }
    </script>
</body>
</html>
