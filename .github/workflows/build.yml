name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Capacitor (Latest)
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android@latest

    - name: Setup Web Dir and Config
      run: |
        mkdir -p www
        cp index.html www/
        echo '{ "appId": "com.mangathai.app", "appName": "Manga Translator TH", "webDir": "www" }' > capacitor.config.json

    - name: Add Android
      run: |
        npx cap add android
        npx cap copy

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Build APK
      working-directory: ./android
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MangaTranslatorTH.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk